# tests/integration/inventory/hosts.ini — static inventory for manual runs.
#
# Not used by integration_test.py, which derives inventory from Terraform
# output via scripts/gen_inventory.py. This file is a manual alternative for
# running plays against a pre-provisioned cluster without Terraform.
#
# Management IPs match terraform/variables.tf defaults (10.0.100.x).
# Verify ansible_host values against actual DHCP leases before use:
#   virsh net-dhcp-leases lustre-mgmt
#
# LNET topology and group structure are identical to the generated inventory.
# ansible/group_vars/all.yml is picked up automatically.

[mgmt_servers]
mgs ansible_host=10.0.100.10 ip_lnet0=192.168.100.9/24 fslabel="MGS" mntpath="mgs"

[metadata_servers]
mds1 ansible_host=10.0.100.11 ip_lnet0=192.168.100.11/24 mdt_index=0 fslabel="lustrefs-MDT0000" mntpath="mdt"
mds2 ansible_host=10.0.100.12 ip_lnet0=192.168.100.13/24 mdt_index=1 fslabel="lustrefs-MDT0001" mntpath="mdt"

[object_servers]
oss1 ansible_host=10.0.100.13 ip_lnet0=192.168.100.15/24 ost_index=0 fslabel="lustrefs-OST0000" mntpath="ost"
oss2 ansible_host=10.0.100.14 ip_lnet0=192.168.100.17/24 ost_index=1 fslabel="lustrefs-OST0001" mntpath="ost"
oss3 ansible_host=10.0.100.15 ip_lnet0=192.168.100.19/24 ost_index=2 fslabel="lustrefs-OST0002" mntpath="ost"
oss4 ansible_host=10.0.100.16 ip_lnet0=192.168.100.21/24 ost_index=3 fslabel="lustrefs-OST0003" mntpath="ost"

[clients]
client1 ansible_host=10.0.100.20 ip_lnet0=192.168.100.23/24

[servers:children]
mgmt_servers
metadata_servers
object_servers

[lustre_cluster:children]
servers
clients

[lustre_cluster:vars]
ansible_user=ansible
mgs_lnet0_ip=192.168.100.9
