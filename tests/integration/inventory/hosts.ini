# tests/integration/inventory/hosts.ini — static CI inventory for local KVM environment.
#
# Not for end users. IPs are hardcoded to the libvirt default bridge (192.168.122.0/24).
# Verify ansible_host values against actual DHCP leases before running:
#   virsh net-dhcp-leases default
#
# LNET topology and group structure are identical to the Terraform-backed inventory.
# ansible/group_vars/all.yml is picked up automatically (resolved from playbook path).

[mgmt_servers]
mgs ansible_host=192.168.122.90 ip_lnet0=192.168.100.9/16 ip_lnet1=192.168.100.10/16 fslabel="MGS" mntpath="mgs"

[metadata_servers]
mds1 ansible_host=192.168.122.91 ip_lnet0=192.168.100.11/16 ip_lnet1=192.168.100.12/16 mdt_index=0 fslabel="lustrefs-MDT0000" mntpath="mdt"
mds2 ansible_host=192.168.122.92 ip_lnet0=192.168.100.13/16 ip_lnet1=192.168.100.14/16 mdt_index=1 fslabel="lustrefs-MDT0001" mntpath="mdt"

[object_servers]
oss1 ansible_host=192.168.122.93 ip_lnet0=192.168.100.15/16 ip_lnet1=192.168.100.16/16 ost_index=0 fslabel="lustrefs-OST0000" mntpath="ost"
oss2 ansible_host=192.168.122.94 ip_lnet0=192.168.100.17/16 ip_lnet1=192.168.100.18/16 ost_index=1 fslabel="lustrefs-OST0001" mntpath="ost"
oss3 ansible_host=192.168.122.95 ip_lnet0=192.168.100.19/16 ip_lnet1=192.168.100.20/16 ost_index=2 fslabel="lustrefs-OST0002" mntpath="ost"
oss4 ansible_host=192.168.122.96 ip_lnet0=192.168.100.21/16 ip_lnet1=192.168.100.22/16 ost_index=3 fslabel="lustrefs-OST0003" mntpath="ost"

[clients]
client1 ansible_host=192.168.122.98 ip_lnet0=192.168.100.7/16 ip_lnet1=192.168.100.8/16

[servers:children]
mgmt_servers
metadata_servers
object_servers

[lustre_cluster:children]
servers
clients

[lustre_cluster:vars]
ansible_user=curleym
ansible_python_interpreter=/usr/bin/python3.9
mgs_lnet0_ip="192.168.100.9"
mgs_lnet1_ip="192.168.100.10"
