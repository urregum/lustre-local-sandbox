---
# Graceful cluster shutdown: unmounts filesystems in safe order
# (clients -> OSS -> MDS -> MGS), then stops the lustre-modules service
# and unloads Lustre and LNet kernel modules on all nodes.
#
# VMs remain running. Re-running the Ansible setup plays restores the cluster.

- name: Unmount Lustre client filesystem
  hosts: clients
  become: true
  tasks:
    - name: Check if Lustre client filesystem is mounted
      ansible.builtin.command: mountpoint -q /mnt/lustre
      register: mount_check
      changed_when: false
      failed_when: false

    - name: Unmount Lustre client filesystem
      ansible.builtin.command: umount /mnt/lustre
      when: mount_check.rc == 0
      changed_when: mount_check.rc == 0

- name: Unmount Lustre object storage
  hosts: object_servers
  become: true
  tasks:
    - name: Check if OST filesystem is mounted
      ansible.builtin.command: "mountpoint -q /mnt/{{ mntpath }}"
      register: mount_check
      changed_when: false
      failed_when: false

    - name: Unmount OST filesystem
      ansible.builtin.command: "umount /mnt/{{ mntpath }}"
      when: mount_check.rc == 0
      changed_when: mount_check.rc == 0

- name: Unmount Lustre metadata storage
  hosts: metadata_servers
  become: true
  tasks:
    - name: Check if MDT filesystem is mounted
      ansible.builtin.command: "mountpoint -q /mnt/{{ mntpath }}"
      register: mount_check
      changed_when: false
      failed_when: false

    - name: Unmount MDT filesystem
      ansible.builtin.command: "umount /mnt/{{ mntpath }}"
      when: mount_check.rc == 0
      changed_when: mount_check.rc == 0

- name: Unmount Lustre management storage
  hosts: mgmt_servers
  become: true
  tasks:
    - name: Check if MGS filesystem is mounted
      ansible.builtin.command: "mountpoint -q /mnt/{{ mntpath }}"
      register: mount_check
      changed_when: false
      failed_when: false

    - name: Unmount MGS filesystem
      ansible.builtin.command: "umount /mnt/{{ mntpath }}"
      when: mount_check.rc == 0
      changed_when: mount_check.rc == 0

- name: Stop lustre-modules service and unload kernel modules
  hosts: lustre_cluster
  become: true
  tasks:
    - name: Stop lustre-modules service
      ansible.builtin.systemd:
        name: lustre-modules
        state: stopped

    - name: Check if LNet has configured interfaces
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          lctl list_nids | grep -v "0@lo"
        executable: /bin/bash
      register: lnet_configured
      changed_when: false
      failed_when: false

    - name: Deconfigure LNet stack
      # Best-effort: releases idle peers before lustre_rmmod. May return EBUSY
      # if active peer connections remain after unmount — lustre_rmmod handles
      # the full teardown regardless.
      ansible.builtin.command: lnetctl lnet unconfigure
      when: lnet_configured.stdout != ""
      changed_when: lnet_configured.stdout != ""
      failed_when: false

    - name: Check if any Lustre or LNet modules are loaded
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          lsmod | grep -qE "^(lustre|lnet|libcfs)"
        executable: /bin/bash
      register: modules_loaded
      changed_when: false
      failed_when: false

    - name: Unload all Lustre and LNet kernel modules
      # lustre_rmmod walks the full sub-module dependency tree in reverse load
      # order (mgs/mdt/ost/obdclass/ptlrpc/mgc/lnet/ksocklnd/libcfs), which
      # modprobe -r lustre alone does not do.
      ansible.builtin.command: lustre_rmmod
      when: modules_loaded.rc == 0
      changed_when: modules_loaded.rc == 0

...
