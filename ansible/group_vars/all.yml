---
# Username with passwordless sudo on all cluster VMs.
# Must match var.vm_user in terraform/variables.tf (default: ansible).
ansible_user: ansible

# Python interpreter path (Rocky Linux 9.4 default)
ansible_python_interpreter: /usr/bin/python3.9

# Lustre version for Whamcloud package installation.
lustre_version: "2.16.1"

# Full kernel version string for the Whamcloud Lustre kernel.
# Used for package installation and grubby default selection on server VMs.
lustre_kernel_version: "5.14.0-427.31.1_lustre.el9.x86_64"

# Lustre filesystem name — must match --fsname used in mkfs.lustre on servers.
lustre_fsname: "lustrefs"

# MPI slots per client VM. Matches client vCPU count by default.
# Override in host_vars if client VMs are resized independently.
mpi_slots_per_client: 2

# MGS LNET interface IPs — used by MDS/OSS/client nodes to register with the MGS.
# These must match the ip_enp7/ip_enp8 values set for the mgs host in hosts.ini.
mgs_enp7_ip: "192.168.100.9"
mgs_enp8_ip: "192.168.100.10"

# Data disk device on all server VMs (boot=vda, data=vdb per Terraform disk order).
lustre_data_device: /dev/vdb

# LNET interface names on Terraform-provisioned VMs.
# KVM virtio NIC PCI order: enp1s0 = management, enp2s0 = lnet0, enp3s0 = lnet1.
# Override here if your environment assigns different names.
lnet_iface_0: enp2s0
lnet_iface_1: enp3s0
