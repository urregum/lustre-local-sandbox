---
# Serializes Lustre storage setup: MGS -> MDS -> OSS, then health checks.
#
- name: Lustre Mgmt Storage Setup
  hosts: mgmt_servers
  become: true
  tasks:
    - name: Check if {{ lustre_data_device }} has a Lustre filesystem
      ansible.builtin.command: blkid -s TYPE -o value {{ lustre_data_device }}
      register: blkid_result
      changed_when: false
      failed_when: false

    - name: Format Lustre Management Server (MGS)
      ansible.builtin.command: >
        mkfs.lustre --fsname={{ lustre_fsname }}
        --mgs
        --mgsnode={{
          ip_lnet0.split('/')[0] ~ '@tcp,' ~
          ip_lnet1.split('/')[0] ~ '@tcp'
        }}
        {{ lustre_data_device }}
      when: blkid_result.stdout != "lustre"

    - name: Ensure Lustre mgmt mount point exists
      ansible.builtin.file:
        path: "/mnt/{{ mntpath }}"
        state: directory
        mode: '0755'

    - name: Force kernel to reread partition table
      ansible.builtin.command: partprobe {{ lustre_data_device }}
      changed_when: false

    - name: Wait for udev to settle
      ansible.builtin.command: udevadm settle
      changed_when: false

    - name: Mount Lustre mgmt filesystem
      ansible.posix.mount:
        path: "/mnt/{{ mntpath }}"
        src: "{{ lustre_data_device }}"
        fstype: lustre
        opts: "_netdev,noauto"
        state: mounted


- name: Lustre Metadata Storage Setup
  hosts: metadata_servers
  become: true
  tasks:
    - name: Check if {{ lustre_data_device }} has a Lustre filesystem
      ansible.builtin.command: blkid -s TYPE -o value {{ lustre_data_device }}
      register: blkid_result
      changed_when: false
      failed_when: false

    - name: Format Lustre Metadata Server (MDS)
      ansible.builtin.command: >
        mkfs.lustre --fsname={{ lustre_fsname }}
        --mdt
        --mgsnode={{
          mgs_lnet0_ip ~ '@tcp,' ~
          mgs_lnet1_ip ~ '@tcp'
        }}
        --index={{ mdt_index }}
        {{ lustre_data_device }}
      when: blkid_result.stdout != "lustre"

    - name: Ensure Lustre metadata mount point exists
      ansible.builtin.file:
        path: "/mnt/{{ mntpath }}"
        state: directory
        mode: '0755'

    - name: Force kernel to reread partition table
      ansible.builtin.command: partprobe {{ lustre_data_device }}
      changed_when: false

    - name: Wait for udev to settle
      ansible.builtin.command: udevadm settle
      changed_when: false

    - name: Mount Lustre metadata filesystem
      ansible.posix.mount:
        path: "/mnt/{{ mntpath }}"
        src: "{{ lustre_data_device }}"
        fstype: lustre
        opts: "_netdev,noauto"
        state: mounted

- name: Lustre Object Storage Setup
  hosts: object_servers
  become: true
  tasks:
    - name: Check if {{ lustre_data_device }} has a Lustre filesystem
      ansible.builtin.command: blkid -s TYPE -o value {{ lustre_data_device }}
      register: blkid_result
      changed_when: false
      failed_when: false

    - name: Format Lustre Object Storage Server (OSS)
      ansible.builtin.command: >
        mkfs.lustre --fsname={{ lustre_fsname }}
        --ost
        --mgsnode={{
          mgs_lnet0_ip ~ '@tcp,' ~
          mgs_lnet1_ip ~ '@tcp'
        }}
        --index={{ ost_index }}
        {{ lustre_data_device }}
      when: blkid_result.stdout != "lustre"

    - name: Ensure Lustre data mount point exists
      ansible.builtin.file:
        path: "/mnt/{{ mntpath }}"
        state: directory
        mode: '0755'

    - name: Force kernel to reread partition table
      ansible.builtin.command: partprobe {{ lustre_data_device }}
      changed_when: false

    - name: Wait for udev to settle
      ansible.builtin.command: udevadm settle
      changed_when: false

    - name: Mount Lustre data filesystem
      ansible.posix.mount:
        path: "/mnt/{{ mntpath }}"
        src: "{{ lustre_data_device }}"
        fstype: lustre
        opts: "_netdev,noauto"
        state: mounted

- name: Health Checks
  hosts: servers
  become: true
  tasks:
    - name: Verify all Lustre devices are UP
      ansible.builtin.command: lctl dl
      register: lctl_output
      changed_when: false
      # Fail if there are any devices found, but NOT all are 'UP'
      failed_when: >
        lctl_output.stdout_lines | length > 0 and
        lctl_output.stdout_lines | reject('search', ' UP ') | list | length > 0

    - name: Check Lustre kernel health
      ansible.builtin.command: lctl get_param -n health_check
      register: health_result
      changed_when: false
      failed_when: "'healthy' not in health_result.stdout"

...
